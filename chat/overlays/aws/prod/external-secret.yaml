apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: chocoletter-external-secret-chat
  namespace: chocoletter
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: chocoletter-chat-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: apps/prod-chocoletter-chat
