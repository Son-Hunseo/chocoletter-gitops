apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: chocoletter-chat-base-route
  namespace: chocoletter
spec:
  parentRefs:
    - name: web-gateway
      namespace: nginx-gateway
      sectionName: http-wildcard
    - name: web-gateway
      namespace: nginx-gateway
      sectionName: https-wildcard
  hostnames:
    - chocoletter-chat-base.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: chocoletter-chat-base-service
          port: 80
