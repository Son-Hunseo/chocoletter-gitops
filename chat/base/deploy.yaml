apiVersion: apps/v1
kind: Deployment
metadata:
  name: chocoletter-chat-base-deploy
  namespace: chocoletter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chocoletter-chat-base
  template:
    metadata:
      labels:
        app: chocoletter-chat-base
    spec:
      containers:
        - name: chocoletter-chat-base
          image: chocoletter-chat-image
          envFrom:
            - secretRef:
                name: chocoletter-chat-secret
          ports:
            - containerPort: 8081
