apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base
  - ../base

images:
  - name: chocoletter-client-image
    newName: harbor.onprem.local/son/chocoletter-client-after
    newTag: "0.3"

patches:
  - target:
      kind: Deployment
      name: chocoletter-client-base-deploy
    path: deploy-patch.yaml
  - target:
      kind: Service
      name: chocoletter-client-base-service
    path: service-patch.yaml
  - target:
      kind: HTTPRoute
      name: chocoletter-client-base-route
    path: http-route-patch.yaml
