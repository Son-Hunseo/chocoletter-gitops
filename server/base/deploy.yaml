apiVersion: apps/v1
kind: Deployment
metadata:
  name: chocoletter-server-base-deploy
  namespace: chocoletter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chocoletter-server-base
  template:
    metadata:
      labels:
        app: chocoletter-server-base
    spec:
      containers:
        - name: chocoletter-server-base
          image: chocoletter-server-image
          ports:
            - containerPort: 8080
