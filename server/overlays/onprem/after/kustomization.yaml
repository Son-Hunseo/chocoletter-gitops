apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base
  - ../base
  - external-secret.yaml

images:
  - name: chocoletter-server-image
    newName: harbor.onprem.arpa/son/chocoletter-server-after
    newTag: "0.5"

patches:
  - target:
      kind: Deployment
      name: chocoletter-server-base-deploy
    path: deploy-patch.yaml
  - target:
      kind: Service
      name: chocoletter-server-base-service
    path: service-patch.yaml
  - target:
      kind: HTTPRoute
      name: chocoletter-server-base-route
    path: http-route-patch.yaml
