apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - ../../base
  - harbor-registry-external-secret.yaml
  - external-secret.yaml
  - http-route.yaml

images:
  - name: chocoletter-server-image
    newName: harbor.onprem.local/son/chocoletter-server
    newTag: "0.3"

patches:
  - target:
      kind: Deployment
      name: refac-chocoletter-server
    patch: |-
      - op: add
        path: /spec/template/spec/imagePullSecrets
        value: [{name: harbor-registry-key}]
      - op: add
        path: /spec/template/spec/containers/0/envFrom
        value: [{secretRef: {name: chocoletter-server-secret}}]
